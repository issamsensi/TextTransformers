{% extends 'layout.html' %}

{% block style %}
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/generate.css') }}">
{% endblock %}

{% block content %}
    <div class="container">
        <form method="POST">
            <textarea name="input_text" placeholder="Write or Paste your text here...">{{ text }}</textarea>
            <button type="submit">Generate Text</button>
        </form>
        {% if result %}
            <div class="output">
                <h2>Generated Text:</h2>
                <p>{{ result[0]['generated_text'] }}</p>
            </div>
        {% endif %}
    </div>
{% endblock %}
